<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwitClone | منصة اجتماعية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* شاشة تسجيل الدخول */
        .auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #111;
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .auth-card h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #fff;
        }
        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border-radius: 30px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: white;
            font-size: 14px;
        }
        .auth-card input:focus {
            outline: none;
            border-color: #1d9bf0;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #1d9bf0;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: #1a1a1a;
            border-radius: 60px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            border-radius: 60px;
        }
        .auth-tab.active {
            background: #1d9bf0;
            color: white;
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .error-msg { color: #ff4444; font-size: 12px; margin-top: 8px; }
        .version { font-size: 10px; color: #666; margin-top: 24px; }

        /* التطبيق الرئيسي */
        #mainApp {
            display: none;
            height: 100vh;
            background: #000;
            overflow-y: auto;
        }

        /* شريط علوي */
        .top-bar {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2a2a2a;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #1d9bf0;
        }
        .top-icons {
            display: flex;
            gap: 20px;
        }
        .top-icon {
            font-size: 22px;
            color: #fff;
            cursor: pointer;
        }

        /* صفحة التغريدات */
        .feed-container {
            padding: 16px 0 80px;
        }
        .tweet-card {
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            padding: 16px;
            cursor: pointer;
        }
        .tweet-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .tweet-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
        }
        .tweet-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .tweet-user {
            flex: 1;
        }
        .tweet-name {
            font-weight: bold;
            cursor: pointer;
        }
        .tweet-username {
            font-size: 13px;
            color: #888;
        }
        .tweet-time {
            font-size: 11px;
            color: #666;
        }
        .tweet-content {
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.4;
        }
        .tweet-media {
            margin-bottom: 12px;
            border-radius: 20px;
            overflow: hidden;
            max-height: 400px;
        }
        .tweet-media img {
            width: 100%;
            object-fit: cover;
        }
        .tweet-actions {
            display: flex;
            gap: 40px;
            margin-top: 12px;
        }
        .tweet-action {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
        }
        .tweet-action.active {
            color: #f91880;
        }
        .tweet-action i { font-size: 18px; }

        /* شريط سفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            z-index: 100;
        }
        .nav-item {
            background: none;
            border: none;
            font-size: 26px;
            color: #888;
            cursor: pointer;
        }
        .nav-item.active {
            color: #1d9bf0;
        }

        /* لوحة إنشاء تغريدة */
        .compose-panel {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            transform: translateY(100%);
            transition: 0.3s;
            overflow-y: auto;
        }
        .compose-panel.open {
            transform: translateY(0);
        }
        .compose-area {
            padding: 20px;
        }
        .compose-input {
            width: 100%;
            min-height: 120px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 16px;
            color: white;
            font-size: 16px;
            resize: none;
        }
        .media-preview {
            margin: 16px 0;
            display: none;
        }
        .media-preview img {
            max-height: 200px;
            border-radius: 16px;
        }

        /* صفحة الملف الشخصي */
        .profile-panel {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 300;
            transform: translateX(100%);
            transition: 0.3s;
            overflow-y: auto;
        }
        .profile-panel.open {
            transform: translateX(0);
        }
        .profile-cover {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #1d9bf0, #f91880);
        }
        .profile-info {
            padding: 0 20px 20px;
            position: relative;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #111;
            border: 3px solid #000;
            margin-top: -50px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name {
            font-size: 20px;
            font-weight: bold;
            margin-top: 12px;
        }
        .profile-bio {
            color: #888;
            font-size: 14px;
            margin: 8px 0;
        }
        .profile-stats {
            display: flex;
            gap: 24px;
            margin: 16px 0;
        }
        .profile-stats div { text-align: center; }
        .profile-buttons {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .profile-btn {
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .profile-btn-primary {
            background: #1d9bf0;
            color: white;
        }
        .profile-btn-secondary {
            background: #2a2a2a;
            color: white;
        }
        .profile-tweets {
            border-top: 1px solid #2a2a2a;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(29,155,240,0.3);
            border-top-color: #1d9bf0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>TwitClone</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg" class="error-msg"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="الاسم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف)">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="error-msg"></div>
        </div>
        <div class="version">الإصدار 1.0 | مارس 2026</div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp">
    <div class="top-bar">
        <div class="logo">TwitClone</div>
        <div class="top-icons">
            <i class="fas fa-search top-icon" onclick="openSearch()"></i>
            <i class="far fa-bell top-icon" onclick="openNotifications()"></i>
        </div>
    </div>

    <div id="feedContainer" class="feed-container">
        <div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i></button>
        <button class="nav-item" onclick="openCompose()"><i class="fas fa-feather-alt"></i></button>
        <button class="nav-item" onclick="openMyProfile()"><i class="fas fa-user"></i></button>
    </div>

    <!-- لوحة إنشاء تغريدة -->
    <div id="composePanel" class="compose-panel">
        <div class="flex justify-between items-center p-4 border-b border-[#2a2a2a]">
            <h3 class="font-bold">إنشاء تغريدة</h3>
            <button onclick="closeCompose()" class="text-2xl">&times;</button>
        </div>
        <div class="compose-area">
            <textarea id="tweetText" class="compose-input" placeholder="ماذا يحدث؟"></textarea>
            <div id="mediaPreview" class="media-preview"></div>
            <div class="flex gap-4 mt-4">
                <button onclick="document.getElementById('tweetImage').click()" class="bg-[#1d9bf0] p-2 rounded-full"><i class="fas fa-image"></i></button>
                <input type="file" id="tweetImage" accept="image/*" style="display:none" onchange="previewTweetImage(this)">
                <button onclick="postTweet()" class="flex-1 bg-[#1d9bf0] text-white p-3 rounded-full font-bold">نشر</button>
            </div>
            <div id="tweetStatus" class="text-center mt-4 text-sm"></div>
        </div>
    </div>

    <!-- صفحة الملف الشخصي -->
    <div id="profilePanel" class="profile-panel">
        <div class="flex justify-between items-center p-4 border-b border-[#2a2a2a]">
            <h3 class="font-bold">الملف الشخصي</h3>
            <button onclick="closeProfile()" class="text-2xl">&times;</button>
        </div>
        <div id="profileCover" class="profile-cover"></div>
        <div class="profile-info">
            <div class="profile-avatar" id="profileAvatar" onclick="changeAvatar()">👤</div>
            <div class="profile-name" id="profileName"></div>
            <div class="profile-bio" id="profileBio"></div>
            <div class="profile-stats">
                <div><div class="text-xl font-bold" id="profileTweets">0</div><div class="text-xs text-gray-500">منشورات</div></div>
                <div><div class="text-xl font-bold" id="profileFollowers">0</div><div class="text-xs text-gray-500">متابع</div></div>
                <div><div class="text-xl font-bold" id="profileFollowing">0</div><div class="text-xs text-gray-500">يتابع</div></div>
            </div>
            <div id="profileButtons" class="profile-buttons"></div>
        </div>
        <div id="profileTweetsList" class="profile-tweets"></div>
        <div class="text-center text-xs text-gray-600 py-4">TwitClone | الإصدار 1.0</div>
    </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
